<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>nbt.de</title>
  <meta name="description" content="nbt.de" />

  <style>
    :root{
      /* Blaugrau (anpassbar) */
      --bg: #5f7d8c;
      --fg: #ffffff;

      /* Herz */
      --heart-stroke: rgba(255,255,255,0.95);
      --heart-text: rgba(255,255,255,0.95);
    }

    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--fg);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .badge {
      font-size: clamp(32px, 6vw, 72px);
      font-weight: 700;
      letter-spacing: 0.02em;
      padding: 18px 28px;
      border-radius: 14px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    /* ---------- Herz oben rechts (touchfähig) ---------- */
    .love-badge{
      position: fixed;
      top: 22px;
      right: 22px;
      width: 210px;                 /* Größe wie vorher */
      height: auto;
      z-index: 9999;

      /* Button optisch neutral */
      background: transparent;
      border: 0;
      padding: 0;
      margin: 0;
      cursor: pointer;

      opacity: 0.96;
      filter: drop-shadow(0 6px 18px rgba(0,0,0,0.14));

      /* Basis-Transform (wichtig: wird auch in Animation verwendet) */
      --base-rot: 0.6deg;
      transform: rotate(var(--base-rot));
      transform-origin: top right;

      /* Touch/UI */
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;

      /* Kein Fokus-Rahmen auf Touch, aber Accessibility bleibt möglich */
      outline: none;
    }

    .love-badge:focus-visible{
      outline: 2px solid rgba(255,255,255,0.40);
      outline-offset: 6px;
      border-radius: 12px;
    }

    .love-svg{
      width: 100%;
      height: auto;
      display: block;
    }

    /* Kontur – dünn & natürlich */
    .love-heart{
      fill: none;
      stroke: var(--heart-stroke);
      stroke-width: 3.5;
      stroke-linecap: round;
      stroke-linejoin: round;

      /* dezente Stift-Note, bleibt sauber */
      stroke-dasharray: 1 0.25;
      stroke-dashoffset: 0.12;
    }

    /* Text – schlicht, enger, weiter innen */
    .love-text{
      fill: var(--heart-text);
      font-size: 34px;
      font-weight: 600;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      letter-spacing: -0.08em;
    }

    /* Mini-Feedback während gedrückt */
    .love-badge:active{
      filter: drop-shadow(0 10px 24px rgba(0,0,0,0.20));
      transform: rotate(var(--base-rot)) scale(1.03);
      opacity: 1;
    }

    /* ---------- Puls-Animation (einmaliges „Pumpen“) ---------- */
    @keyframes lovePulse {
      0%   { transform: rotate(var(--base-rot)) scale(1); }
      35%  { transform: rotate(var(--base-rot)) scale(1.08); }
      100% { transform: rotate(var(--base-rot)) scale(1); }
    }

    .love-badge.pulse{
      animation: lovePulse 420ms ease-out;
    }

    /* Mobile */
    @media (max-width: 600px){
      .love-badge{
        width: 155px;
        top: 14px;
        right: 14px;
      }
      .love-text{
        font-size: 28px;
      }
    }

    /* Respektiert Systemeinstellung „weniger Bewegung“ */
    @media (prefers-reduced-motion: reduce){
      .love-badge,
      .love-badge.pulse{
        animation: none !important;
      }
    }
  </style>
</head>

<body>
  <div class="badge">nbt.de</div>

  <!-- Herz-Overlay oben rechts -->
  <button type="button" class="love-badge" id="loveBadge" aria-label="Herz K plus R">
    <svg viewBox="0 0 200 180" class="love-svg" role="img" aria-hidden="true">
      <path
        class="love-heart"
        d="M100 164
           C 28 112, 12 70, 40 42
           C 60 22, 86 26, 98 48
           C 112 26, 138 20, 160 42
           C 190 70, 172 114, 100 164 Z"
      />
      <text x="98" y="90" text-anchor="middle" dominant-baseline="middle" class="love-text">
        K + R
      </text>
    </svg>
  </button>

  <script>
    // Puls beim Tippen/Klicken: Klasse kurz setzen, damit die Animation jedes Mal neu startet
    (function () {
      const badge = document.getElementById('loveBadge');
      if (!badge) return;

      const pulse = () => {
        badge.classList.remove('pulse');
        // Reflow erzwingen, damit die Animation zuverlässig neu startet
        void badge.offsetWidth;
        badge.classList.add('pulse');
      };

      // click funktioniert auf Touch & Desktop zuverlässig
      badge.addEventListener('click', pulse);

      // Optional: verhindert „Doppeltap-Zoom“-Artefakte auf manchen Browsern (zusätzlich zu touch-action)
      badge.addEventListener('touchend', function (e) {
        e.preventDefault();
        pulse();
      }, { passive: false });
    })();
  </script>
</body>
</html>
