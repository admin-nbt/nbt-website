<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>nbt.de</title>
  <meta name="description" content="nbt.de" />

  <style>
    :root{
      /* Blaugrau (anpassbar) */
      --bg: #5f7d8c;
      --fg: #ffffff;

      /* Herz */
      --heart-stroke: rgba(255,255,255,0.95);
      --heart-text: rgba(255,255,255,0.95);
    }

    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--fg);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .badge {
      font-size: clamp(32px, 6vw, 72px);
      font-weight: 700;
      letter-spacing: 0.02em;
      padding: 18px 28px;
      border-radius: 14px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    /* ---------- Herz oben rechts ---------- */
    .love-badge{
      position: fixed;
      top: 22px;
      right: 22px;
      width: 210px;
      height: auto;
      z-index: 9999;

      /* Touch erlauben */
      pointer-events: auto;

      opacity: 0.96;
      filter: drop-shadow(0 6px 18px rgba(0,0,0,0.14));
      transform: rotate(0.6deg);
      transform-origin: top right;

      /* Touch/UI */
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;

      /* weiche Übergänge */
      transition: transform 160ms ease, filter 160ms ease, opacity 160ms ease;
      text-decoration: none; /* weil <a> */
      display: block;
    }

    .love-svg{
      width: 100%;
      height: auto;
      display: block;
    }

    /* Eine saubere Kontur – dünn & natürlich */
    .love-heart{
      fill: none;
      stroke: var(--heart-stroke);
      stroke-width: 3.5;
      stroke-linecap: round;
      stroke-linejoin: round;

      /* sehr dezente „Stift“-Note */
      stroke-dasharray: 1 0.25;
      stroke-dashoffset: 0.12;
    }

    /* Text: schlichter, enger, höher */
    .love-text{
      fill: var(--heart-text);
      font-size: 34px;
      font-weight: 600;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      letter-spacing: -0.08em;
    }

    /* Während gedrückt: mini Feedback (zusätzlich zum Puls) */
    .love-badge:active{
      transform: rotate(0.6deg) scale(1.03);
      opacity: 1;
      filter: drop-shadow(0 10px 24px rgba(0,0,0,0.20));
    }

    /* ---------- Puls-Animation ---------- */
    @keyframes lovePulse {
      0%   { transform: rotate(0.6deg) scale(1);    filter: drop-shadow(0 6px 18px rgba(0,0,0,0.14)); opacity: 0.96; }
      35%  { transform: rotate(0.6deg) scale(1.08); filter: drop-shadow(0 12px 28px rgba(0,0,0,0.24)); opacity: 1; }
      100% { transform: rotate(0.6deg) scale(1);    filter: drop-shadow(0 6px 18px rgba(0,0,0,0.14)); opacity: 0.96; }
    }

    /* Klasse wird per JS kurz gesetzt */
    .love-badge.pulse{
      animation: lovePulse 420ms ease-out;
    }

    /* Mobile */
    @media (max-width: 600px){
      .love-badge{
        width: 155px;
        top: 14px;
        right: 14px;
      }
      .love-text{
        font-size: 28px;
      }
    }

    /* Optional: weniger Animation für Nutzer, die das so eingestellt haben */
    @media (prefers-reduced-motion: reduce){
      .love-badge,
      .love-badge.pulse{
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>

<body>
  <div class="badge">nbt.de</div>

  <!-- Herz-Overlay oben rechts (touchfähig) -->
  #
    <svg viewBox="0 0 200 180" class="love-svg" role="img" aria-hidden="true">
      <path
        class="love-heart"
        d="M100 164
           C 28 112, 12 70, 40 42
           C 60 22, 86 26, 98 48
           C 112 26, 138 20, 160 42
           C 190 70, 172 114, 100 164 Z"
      />
      <text x="98" y="90" text-anchor="middle" dominant-baseline="middle" class="love-text">
        K + R
      </text>
    </svg>
  </a>

  <script>
    // Puls beim Tippen/Klicken: Klasse kurz setzen, damit die Animation jedes Mal neu startet
    (function () {
      const badge = document.querySelector('.love-badge');
      if (!badge) return;

      const triggerPulse = (event) => {
        // verhindert, dass der Link nach oben springt (href="#")
        event.preventDefault();

        // Animation zuverlässig neu starten
        badge.classList.remove('pulse');
        // Reflow erzwingen, damit das Entfernen wirksam wird
        void badge.offsetWidth;
        badge.classList.add('pulse');
      };

      // Touch + Maus
      badge.addEventListener('click', triggerPulse, { passive: false });

      // Optional: auch bei Tastatur (Enter/Space) pulsen
      badge.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          badge.classList.remove('pulse');
          void badge.offsetWidth;
          badge.classList.add('pulse');
        }
      });
    })();
  </script>
</body>
</html>
