<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>nbt.de</title>
  <meta name="description" content="nbt.de" />

  <style>
    :root{
      /* Blaugrau (anpassbar) */
      --bg: #5f7d8c;
      --fg: #ffffff;

      /* Herz */
      --heart-stroke: rgba(255,255,255,0.95);
      --heart-text: rgba(255,255,255,0.95);
    }

    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--fg);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .badge {
      font-size: clamp(32px, 6vw, 72px);
      font-weight: 700;
      letter-spacing: 0.02em;
      padding: 18px 28px;
      border-radius: 14px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    /* ---------- Herz oben rechts ---------- */
    .love-badge{
      position: fixed;
      top: 22px;
      right: 22px;
      width: 210px;
      height: auto;
      z-index: 9999;

      /* rein dekorativ -> blockiert keine Klicks */
      pointer-events: none;

      opacity: 0.96;
      filter: drop-shadow(0 6px 18px rgba(0,0,0,0.14));
      transform: rotate(0.8deg); /* minimal schief = natürlicher */
      transform-origin: top right;
    }

    .love-svg{
      width: 100%;
      height: auto;
      display: block;
    }

    /* Eine saubere Kontur – dünn & natürlich */
    .love-heart{
      fill: none;
      stroke: var(--heart-stroke);
      stroke-width: 3.5;          /* dünner */
      stroke-linecap: round;
      stroke-linejoin: round;

      /* sehr dezente „Stift“-Unregelmäßigkeit, bleibt aber sauber */
      stroke-dasharray: 1 0.25;
      stroke-dashoffset: 0.12;
    }

    /* Text: etwas kleiner + weiter innen */
    .love-text{
      fill: var(--heart-text);
      font-size: 36px;
      font-weight: 700;

      /* Handschrift-Fallback ohne externe Fonts */
      font-family: "Bradley Hand", "Segoe Print", "Comic Sans MS", "Marker Felt",
                   system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;

      letter-spacing: 0.02em;
    }

    /* Text minimal schief & etwas nach innen verschoben */
    .love-text-rotate{
      transform: rotate(-4deg);
      transform-origin: 96px 100px;
    }

    @media (max-width: 600px){
      .love-badge{
        width: 155px;
        top: 14px;
        right: 14px;
      }
      .love-text{
        font-size: 30px;
      }
    }
  </style>
</head>

<body>
  <div class="badge">nbt.de</div>

  <!-- Herz-Overlay oben rechts -->
  <div class="love-badge" aria-label="K + R im Herzen">
    <svg viewBox="0 0 200 180" class="love-svg" role="img" aria-hidden="true">
      <!-- Herzform: bewusst nicht super „perfekt“, aber sauber -->
      <path
        class="love-heart"
        d="M100 164
           C 28 112, 12 70, 40 42
           C 60 22, 86 26, 98 48
           C 112 26, 138 20, 160 42
           C 190 70, 172 114, 100 164 Z"
      />

      <!-- Text: leicht nach links/unten für mehr Abstand zu den Kanten -->
      <text x="96" y="100" text-anchor="middle" dominant-baseline="middle"
            class="love-text love-text-rotate">
        K + R
      </text>
    </svg>
  </div>
</body>
</html>
