<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>nbt.de</title>
  <meta name="description" content="nbt.de" />

  <style>
    :root{
      /* Blaugrau (anpassbar) */
      --bg: #5f7d8c;
      --fg: #ffffff;

      /* Sonne */
      --sun-stroke: rgba(255,255,255,0.95);
      --sun-fill: rgba(255,255,255,0.00);
    }

    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--fg);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .badge {
      font-size: clamp(32px, 6vw, 72px);
      font-weight: 700;
      letter-spacing: 0.02em;
      padding: 18px 28px;
      border-radius: 14px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    /* ---------- Sonne oben rechts (touchfähig) ---------- */
    .sun-badge{
      position: fixed;
      top: 22px;
      right: 22px;
      width: 180px;
      height: auto;
      z-index: 9999;

      /* Button optisch neutral */
      background: transparent;
      border: 0;
      padding: 0;
      margin: 0;
      cursor: pointer;

      opacity: 0.96;
      filter: drop-shadow(0 6px 18px rgba(0,0,0,0.14));

      /* Basis-Transform (wichtig: wird auch in Animation verwendet) */
      --base-rot: 0.4deg;
      transform: rotate(var(--base-rot));
      transform-origin: top right;

      /* Touch/UI */
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;

      outline: none;
    }

    .sun-badge:focus-visible{
      outline: 2px solid rgba(255,255,255,0.40);
      outline-offset: 6px;
      border-radius: 12px;
    }

    .sun-svg{
      width: 100%;
      height: auto;
      display: block;
    }

    /* Sonne – Kreis + Strahlen (sauber, handgezeichnete Note) */
    .sun-core{
      fill: var(--sun-fill);
      stroke: var(--sun-stroke);
      stroke-width: 3.5;
      stroke-linecap: round;
      stroke-linejoin: round;

      /* dezente Stift-Note */
      stroke-dasharray: 1 0.25;
      stroke-dashoffset: 0.12;
    }

    .sun-ray{
      stroke: var(--sun-stroke);
      stroke-width: 3.5;
      stroke-linecap: round;

      /* dezente Stift-Note */
      stroke-dasharray: 1 0.25;
      stroke-dashoffset: 0.12;
    }

    /* Mini-Feedback während gedrückt */
    .sun-badge:active{
      filter: drop-shadow(0 10px 24px rgba(0,0,0,0.20));
      transform: rotate(var(--base-rot)) scale(1.03);
      opacity: 1;
    }

    /* ---------- Puls-Animation (einmaliges „Pumpen“) ---------- */
    @keyframes sunPulse {
      0%   { transform: rotate(var(--base-rot)) scale(1); }
      35%  { transform: rotate(var(--base-rot)) scale(1.08); }
      100% { transform: rotate(var(--base-rot)) scale(1); }
    }

    .sun-badge.pulse{
      animation: sunPulse 420ms ease-out;
    }

    /* Mobile */
    @media (max-width: 600px){
      .sun-badge{
        width: 135px;
        top: 14px;
        right: 14px;
      }
    }

    /* Respektiert Systemeinstellung „weniger Bewegung“ */
    @media (prefers-reduced-motion: reduce){
      .sun-badge,
      .sun-badge.pulse{
        animation: none !important;
      }
    }
  </style>
</head>

<body>
  <div class="badge">nbt.de</div>

  <!-- Sonne-Overlay oben rechts -->
  <button type="button" class="sun-badge" id="sunBadge" aria-label="Sonne">
    <svg class="sun-svg" viewBox="0 0 200 200" role="img" aria-hidden="true">
      <!-- Strahlen -->
      <line class="sun-ray" x1="100" y1="18"  x2="100" y2="40" />
      <line class="sun-ray" x1="100" y1="160" x2="100" y2="182" />
      <line class="sun-ray" x1="18"  y1="100" x2="40"  y2="100" />
      <line class="sun-ray" x1="160" y1="100" x2="182" y2="100" />

      <line class="sun-ray" x1="38"  y1="38"  x2="54"  y2="54" />
      <line class="sun-ray" x1="146" y1="146" x2="162" y2="162" />
      <line class="sun-ray" x1="38"  y1="162" x2="54"  y2="146" />
      <line class="sun-ray" x1="146" y1="54"  x2="162" y2="38" />

      <!-- Kreis der Sonne -->
      <circle class="sun-core" cx="100" cy="100" r="48" />
    </svg>
  </button>

  <script>
    // Puls beim Tippen/Klicken: Klasse kurz setzen, damit die Animation jedes Mal neu startet
    (function () {
      const badge = document.getElementById('sunBadge');
      if (!badge) return;

      const pulse = () => {
        badge.classList.remove('pulse');
        void badge.offsetWidth; // Reflow, damit Animation neu startet
        badge.classList.add('pulse');
      };

      // click funktioniert auf Touch & Desktop zuverlässig
      badge.addEventListener('click', pulse);

      // iOS Safari: touchend als Backup, verhindert manchmal das verzögerte Click-Feeling
      badge.addEventListener('touchend', function (e) {
        e.preventDefault();
        pulse();
      }, { passive: false });
    })();
  </script>
</body>
</html>
