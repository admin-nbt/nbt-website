<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>nbt.de</title>
  <meta name="description" content="nbt.de" />

  <style>
    :root{
      /* Blaugrau (anpassbar) */
      --bg: #5f7d8c;
      --fg: #ffffff;

      /* Herz */
      --heart-stroke: rgba(255,255,255,0.95);
      --heart-text: rgba(255,255,255,0.95);
    }

    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--fg);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .badge {
      font-size: clamp(32px, 6vw, 72px);
      font-weight: 700;
      letter-spacing: 0.02em;
      padding: 18px 28px;
      border-radius: 14px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    /* ---------- Herz oben rechts ---------- */
    .love-badge{
      position: fixed;
      top: 22px;
      right: 22px;
      width: 210px;
      height: auto;
      z-index: 9999;

      /* rein dekorativ -> blockiert keine Klicks */
      pointer-events: none;

      opacity: 0.96;
      filter: drop-shadow(0 6px 18px rgba(0,0,0,0.14));
      transform: rotate(0.6deg); /* minimal = natürlich, aber sauber */
      transform-origin: top right;
    }

    .love-svg{
      width: 100%;
      height: auto;
      display: block;
    }

    /* Eine saubere Kontur – dünn & natürlich */
    .love-heart{
      fill: none;
      stroke: var(--heart-stroke);
      stroke-width: 3.5;
      stroke-linecap: round;
      stroke-linejoin: round;

      /* sehr dezente „Stift“-Note */
      stroke-dasharray: 1 0.25;
      stroke-dashoffset: 0.12;
    }

    /* Text: schlichter, enger, höher */
    .love-text{
      fill: var(--heart-text);
      font-size: 34px;
      font-weight: 600;

      /* schlichte, klare Schrift */
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;

      /* enger setzen => weniger Randnähe links/rechts */
      letter-spacing: -0.08em;
    }

    @media (max-width: 600px){
      .love-badge{
        width: 155px;
        top: 14px;
        right: 14px;
      }
      .love-text{
        font-size: 28px;
      }
    }
  </style>
</head>

<body>
  <div class="badge">nbt.de</div>

  <!-- Herz-Overlay oben rechts -->
  <div class="love-badge" aria-label="K + R im Herzen">
    <svg viewBox="0 0 200 180" class="love-svg" role="img" aria-hidden="true">

      <!-- Herzform -->
      <path
        class="love-heart"
        d="M100 164
           C 28 112, 12 70, 40 42
           C 60 22, 86 26, 98 48
           C 112 26, 138 20, 160 42
           C 190 70, 172 114, 100 164 Z"
      />

      <!-- Text: nach oben, leicht nach links für mehr Innenabstand -->
      <text x="98" y="90" text-anchor="middle" dominant-baseline="middle" class="love-text">
        K + R
      </text>
    </svg>
  </div>
</body>
</html>
